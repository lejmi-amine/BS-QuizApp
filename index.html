<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TI2 Quiz — BS, RA & SNP Ultimate Dark Edition</title>
    <style>
      /* ── Reset & Scope ── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        min-height: 100%;
        background: #0c0c18;
      }
      .qw {
        --bg: #0c0c18;
        --s0: #13132a;
        --s1: #1a1a35;
        --acc: #7c6cf0;
        --acc2: #a78bfa;
        --text: #ededff;
        --muted: #9a9ac8;
        --ok: #10b981;
        --no: #ef4444;
        --bdr: rgba(255, 255, 255, 0.07);
        --r: 14px;
        --rsm: 10px;
        padding: 1.5rem;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background:
          radial-gradient(
            circle at top,
            rgba(124, 108, 240, 0.13),
            transparent 32%
          ),
          var(--bg);
        min-height: 100vh;
        color: var(--text);
        max-width: 980px;
        margin: 0 auto;
      }
      .hdr {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1.5rem;
        padding: 14px 20px;
        background: linear-gradient(
          135deg,
          rgba(124, 108, 240, 0.14),
          rgba(167, 139, 250, 0.07)
        );
        border: 1px solid rgba(124, 108, 240, 0.22);
        border-radius: var(--r);
      }
      .ttl {
        font-size: 15px;
        font-weight: 800;
        background: linear-gradient(90deg, var(--acc2), var(--acc));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .sts {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .st {
        background: rgba(124, 108, 240, 0.11);
        border: 1px solid rgba(124, 108, 240, 0.22);
        border-radius: 30px;
        padding: 4px 13px;
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
      }
      .st span {
        font-weight: 800;
        color: var(--acc2);
      }
      .cbar {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 1.25rem;
      }
      .cb {
        background: transparent;
        border: 1px solid var(--bdr);
        border-radius: 30px;
        padding: 5px 13px;
        font-size: 11px;
        cursor: pointer;
        color: var(--muted);
        font-family: inherit;
        transition: all 0.18s ease;
      }
      .cb:hover:not(.all):not(.act) {
        border-color: rgba(124, 108, 240, 0.4);
        color: var(--acc2);
        background: rgba(124, 108, 240, 0.07);
      }
      .cb.act {
        background: rgba(124, 108, 240, 0.15);
        border-color: rgba(124, 108, 240, 0.45);
        color: var(--acc2);
        font-weight: 700;
      }
      .cb.all {
        background: linear-gradient(135deg, var(--acc), #6d28d9);
        border-color: transparent;
        color: #fff;
        font-weight: 700;
        box-shadow: 0 2px 14px rgba(124, 108, 240, 0.35);
      }
      .pb {
        height: 4px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 4px;
        margin-bottom: 1.5rem;
        overflow: hidden;
      }
      .pf {
        height: 100%;
        background: linear-gradient(90deg, var(--acc), var(--acc2));
        border-radius: 4px;
        transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 0 10px rgba(124, 108, 240, 0.55);
      }
      .card {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.018), transparent 40%),
          var(--s0);
        border: 1px solid var(--bdr);
        border-radius: var(--r);
        padding: 1.5rem;
        margin-bottom: 1rem;
        box-shadow:
          0 10px 48px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(255, 255, 255, 0.02);
        animation: su 0.22s cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes su {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .badge {
        display: inline-block;
        background: linear-gradient(
          135deg,
          rgba(124, 108, 240, 0.2),
          rgba(167, 139, 250, 0.12)
        );
        border: 1px solid rgba(124, 108, 240, 0.3);
        color: var(--acc2);
        font-size: 10px;
        font-weight: 700;
        padding: 3px 11px;
        border-radius: 30px;
        margin-bottom: 14px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .q {
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.65;
        margin-bottom: 1.5rem;
      }
      .opts {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 1rem;
      }
      .opt {
        background: rgba(255, 255, 255, 0.024);
        border: 1px solid var(--bdr);
        border-radius: var(--rsm);
        padding: 11px 14px 11px 48px;
        font-size: 13.5px;
        cursor: pointer;
        text-align: left;
        color: var(--text);
        transition: all 0.16s ease;
        line-height: 1.5;
        font-family: inherit;
        position: relative;
      }
      .opt-l {
        position: absolute;
        left: 13px;
        top: 50%;
        transform: translateY(-50%);
        width: 23px;
        height: 23px;
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.055);
        border: 1px solid rgba(255, 255, 255, 0.09);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 800;
        color: var(--muted);
        transition: all 0.16s;
      }
      .opt:hover:not(:disabled) {
        border-color: rgba(124, 108, 240, 0.48);
        background: rgba(124, 108, 240, 0.07);
        transform: translateX(3px);
      }
      .opt:hover:not(:disabled) .opt-l {
        background: rgba(124, 108, 240, 0.18);
        border-color: rgba(124, 108, 240, 0.4);
        color: var(--acc2);
      }
      .opt.ok {
        background: rgba(16, 185, 129, 0.09);
        border-color: rgba(16, 185, 129, 0.45);
        color: #6ee7b7;
        transform: none;
      }
      .opt.ok .opt-l {
        background: rgba(16, 185, 129, 0.2);
        border-color: rgba(16, 185, 129, 0.4);
        color: #6ee7b7;
      }
      .opt.no {
        background: rgba(239, 68, 68, 0.07);
        border-color: rgba(239, 68, 68, 0.38);
        color: #fca5a5;
      }
      .opt.no .opt-l {
        background: rgba(239, 68, 68, 0.18);
        border-color: rgba(239, 68, 68, 0.38);
        color: #fca5a5;
      }
      .fb {
        padding: 12px 15px;
        border-radius: var(--rsm);
        font-size: 13px;
        line-height: 1.65;
        margin-bottom: 1rem;
        animation: su 0.18s ease;
      }
      .fb.ok {
        background: rgba(16, 185, 129, 0.08);
        border: 1px solid rgba(16, 185, 129, 0.22);
        border-left: 3px solid var(--ok);
        color: #86efac;
      }
      .fb.no {
        background: rgba(239, 68, 68, 0.06);
        border: 1px solid rgba(239, 68, 68, 0.18);
        border-left: 3px solid var(--no);
        color: #fca5a5;
      }
      .acts {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .btn {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--bdr);
        border-radius: var(--rsm);
        padding: 10px 20px;
        font-size: 13px;
        cursor: pointer;
        color: var(--muted);
        transition: all 0.16s;
        font-family: inherit;
        font-weight: 600;
      }
      .btn:hover {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }
      .btn.p {
        background: linear-gradient(135deg, var(--acc), #6d28d9);
        border-color: transparent;
        color: #fff;
        font-weight: 800;
        box-shadow: 0 2px 18px rgba(124, 108, 240, 0.4);
      }
      .btn.p:hover {
        box-shadow: 0 4px 28px rgba(124, 108, 240, 0.6);
        transform: translateY(-1px);
      }
      .res {
        text-align: center;
        padding: 2.5rem 1rem;
      }
      .res-ring {
        margin: 0 auto 18px;
        display: block;
      }
      .rm {
        font-size: 15px;
        color: var(--muted);
        margin-bottom: 1.75rem;
      }
      .ms {
        margin-top: 1.75rem;
        text-align: left;
      }
      .ms h3 {
        font-size: 11px;
        font-weight: 800;
        color: var(--muted);
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .mi {
        background: rgba(239, 68, 68, 0.05);
        border: 1px solid rgba(239, 68, 68, 0.14);
        border-left: 3px solid rgba(239, 68, 68, 0.45);
        border-radius: var(--rsm);
        padding: 12px 14px;
        font-size: 12.5px;
        color: var(--muted);
        margin-bottom: 8px;
        line-height: 1.6;
      }
      .mi strong {
        color: var(--text);
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }
      @media (max-width: 640px) {
        .qw {
          padding: 1rem;
        }
        .hdr {
          align-items: flex-start;
          flex-direction: column;
        }
        .card {
          padding: 1.15rem;
        }
        .q {
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="qw">
      <div class="hdr">
        <div class="ttl">BS Quiz — Ultimate ZF Edition</div>
        <div class="sts">
          <div class="st">Richtig: <span id="sc">0</span></div>
          <div class="st">Total: <span id="tc">0</span></div>
        </div>
      </div>
      <div class="cbar" id="cb"></div>
      <div class="pb"><div class="pf" id="pf" style="width: 0%"></div></div>
      <div id="qc"></div>
    </div>

    <script>
      const Q = [
        // Kap 1-BS
        {
          k: "Kap 1-BS",
          q: "Was ist ein Betriebssystem?",
          o: [
            "Software die Komplexität versteckt & gemeinsamen Zugriff auf Ressourcen ermöglicht",
            "Ein Prozessor der Befehle ausführt",
            "Nur ein Dateiverwaltungsprogramm",
            "Hardware die Software steuert",
          ],
          a: 0,
          e: "BS = Software die Komplexität versteckt (Nutzer/Programmierer müssen HW nicht kennen) und gemeinsamen sicheren Zugriff auf Rechen-, Speicher- & Kommunikationsmittel ermöglicht.",
        },
        {
          k: "Kap 1-BS",
          q: "Was sind die zwei großen Software-Kategorien?",
          o: [
            "Systemprogramme (BS) & Anwendungsprogramme",
            "Hardware & Software",
            "Kernel & User-Space",
            "Treiber & Compiler",
          ],
          a: 0,
          e: "Systemprogramme (=BS): Steuerprogramme, Übersetzer, Testhilfen, Dienstprogramme. Anwendungsprogramme: selbst erstellte Programme, Bibliotheksprogramme, Softwarepakete. Compiler = Systemprogramm, Untertyp: Übersetzer.",
        },
        {
          k: "Kap 1-BS",
          q: "Was ist der Unterschied zwischen physischen und logischen Kanälen?",
          o: [
            "Physisch: Programm spricht HW direkt an — Logisch: BS sitzt als Vermittler dazwischen",
            "Beide sind identisch",
            "Logisch ist schneller",
            "Physisch ist moderner",
          ],
          a: 0,
          e: "Ohne BS → physische Kanäle (Programm spricht HW direkt an). Mit BS → logische Kanäle (BS als Vermittler). Das Programm muss nicht wissen wie die HW funktioniert.",
        },
        {
          k: "Kap 1-BS",
          q: "Was bedeutet es dass das BS die Ressourcen virtualisiert?",
          o: [
            "BS stellt jedem Programm so, als ob es die Ressource allein hätte",
            "BS kauft mehr Hardware",
            "BS löscht nicht benötigte Ressourcen",
            "BS teilt Ressourcen gleichmäßig auf",
          ],
          a: 0,
          e: "Virtualisieren: das BS stellt jedem Programm so, als ob es die Ressource allein hätte — obwohl sich alle Programme den echten RAM teilen.",
        },
        {
          k: "Kap 1-BS",
          q: "Was gehört NICHT zum Betriebssystem?",
          o: [
            "BIOS/UEFI, Compiler, Editor",
            "Kernel, Treiber, Scheduler",
            "Dateisystem, Speicherverwaltung",
            "Prozessverwaltung, Scheduling",
          ],
          a: 0,
          e: "Zum BS gehört NICHT: BIOS/UEFI, Übersetzer (Compiler), Editor. BS verwaltet Ressourcen zur Laufzeit — alles davor/daneben gehört nicht dazu.",
        },
        {
          k: "Kap 1-BS",
          q: "Was ist der Unterschied zwischen Echtzeit-BS und PC-BS?",
          o: [
            "RTOS muss Aufgaben in garantierter Zeit erledigen — PC-BS hat keine Zeitgarantie",
            "RTOS ist schneller als PC-BS",
            "PC-BS ist für Server, RTOS für Desktop",
            "Beide sind identisch",
          ],
          a: 0,
          e: "RTOS: Pünktlichkeit ist Pflicht (Airbag muss im richtigen Moment auslösen, zu spät = Fehler). PC-BS: Pünktlichkeit ist nice-to-have (1 Sekunde Wartezeit ist ok).",
        },
        {
          k: "Kap 1-BS",
          q: "Was sind die 2 Rollen des OS laut Silberschatz?",
          o: [
            "Resource Allocator (Manager) & Control Program (Guard)",
            "Kernel & User-Space",
            "Scheduler & File Manager",
            "Hardware & Software",
          ],
          a: 0,
          e: "OS hat 2 Rollen: Resource Allocator = Manager (wer bekommt was, effiziente & faire Zuteilung) und Control Program = Guard (verhindert Fehler und unsachgemäße Nutzung).",
        },
        {
          k: "Kap 1-BS",
          q: "Was ist ein Systemcall und warum läuft er im Kernel-Space?",
          o: [
            "Prozess fordert BS-Funktionalität an — Kernel-Space weil nur BS auf HW zugreifen darf",
            "Benutzer ruft eine Funktion auf",
            "Hardware sendet Signal an CPU",
            "Prozess kommuniziert mit Prozess",
          ],
          a: 0,
          e: "Systemcall: Prozess fordert Funktionalität des BS an. Ablauf: User-Space → Systemcall → Kernel-Space (BS erledigt) → zurück zu Prozess. Im Kernel-Space weil Systemcalls direkt auf Hardware und geschützte Ressourcen zugreifen müssen — das darf nur das BS.",
        },
        {
          k: "Kap 1-BS",
          q: "Was ist der Unterschied zwischen Kernel-Space und User-Space?",
          o: [
            "Kernel-Space: BS mit vollem HW-Zugriff — User-Space: Anwendungen eingeschränkt",
            "Beide identisch",
            "Kernel-Space ist für Nutzer",
            "User-Space ist schneller",
          ],
          a: 0,
          e: "BS läuft im Kernel-Space (volle Kontrolle über HW). Prozesse laufen im User-Space (eingeschränkt). Nur so ist perfekter Schutz zwischen Prozessen möglich — funktioniert nur mit CPU-Unterstützung!",
        },
        {
          k: "Kap 1-BS",
          q: "Was ist Unix und wie ist es entstanden?",
          o: [
            "Abgespeckte Version von MULTICS — 2 Strömungen: AT&T & BSD — Linux vereint beide",
            "Ein modernes Betriebssystem",
            "Direkt von Microsoft entwickelt",
            "Eine Version von Windows",
          ],
          a: 0,
          e: "MULTICS = erstes BS für mehrere gleichzeitige Nutzer. Abgespeckte Version → UNIX. 2 Strömungen: AT&T Unix (kommerziell) & BSD Unix (akademisch). Linux versucht beide Lager unter sich zu vereinen.",
        },
        {
          k: "Kap 1-BS",
          q: "Was sind die 4 Hauptaufgaben des BS?",
          o: [
            "Abstraktion, Ressourcenverwaltung, API, Dateiverwaltung",
            "Nur Scheduling und Paging",
            "Nur CPU und RAM verwalten",
            "Benutzer authentifizieren",
          ],
          a: 0,
          e: "4 Hauptaufgaben: 1. Abstraktion (HW-Komplexität verstecken) 2. Ressourcenverwaltung (CPU, Speicher zuteilen und wegnehmen!) 3. API (einheitliche Programmierschnittstelle) 4. Dateiverwaltung.",
        },
        {
          k: "Kap 1-BS",
          q: "Was sind die 5 Generationen von Betriebssystemen?",
          o: [
            "1.Gen: Elektronenröhren — 2.Gen: Transistoren/Stapel — 3.Gen: ICs/Multiprogrammierung — 4.Gen: PCs — 5.Gen: Smartphones",
            "Nur 3 Generationen",
            "Nur Windows und Linux",
            "Generationen existieren nicht",
          ],
          a: 0,
          e: "1.Gen (1945-55): Elektronenröhren, kein BS. 2.Gen (1955-65): Transistoren, Stapelverarbeitung, IBM. 3.Gen (1965-80): ICs, Multiprogrammierung, UNIX. 4.Gen (1980-heute): PCs, MS-DOS, Windows, Linux. 5.Gen (1990-heute): Smartphones, Android, iOS.",
        },
        // Kap 2-B
        {
          k: "Kap 2-BS",
          q: "Was ist ein Bus und welche 2 Arten gibt es?",
          o: [
            "Gemeinsamer elektrischer Weg — Parallel (bytewise, veraltet) & Seriell (nacheinander, modern)",
            "Nur seriell",
            "Nur parallel",
            "Ein Programm das Daten überträgt",
          ],
          a: 0,
          e: "Bus = gemeinsamer elektrischer Weg zur Datenübertragung. Parallel: bytewise über mehrere Leitungen gleichzeitig (veraltet, Beispiele: Parallel-ATA, ISA). Seriell: nacheinander über eine Leitung (modern, Beispiele: SATA, PCI-Express, USB 3.0, Thunderbolt). Merksatz: Parallel=breite Straße, Seriell=schmale Einbahnstraße (schneller!).",
        },
        {
          k: "Kap 2-BS",
          q: "Was sind die Probleme bei paralleler Übertragung?",
          o: [
            "Laufzeitunterschiede, verschiedene Pegel, hoher Leistungsverbrauch, große Steckverbinder",
            "Nur zu langsam",
            "Kein Nachteil",
            "Zu teuer",
          ],
          a: 0,
          e: "Probleme parallel: Laufzeitunterschiede bei hohen Geschwindigkeiten, verschiedene Pegel, hoher Leistungsverbrauch, große Steckverbinder (teuer & fehleranfällig). Daher hat seriell gewonnen!",
        },
        {
          k: "Kap 2-BS",
          q: "Was sind Adressbus, Datenbus und Steuerbus?",
          o: [
            "Adressbus=Wohin? — Datenbus=Was? (bidirektional 8-512 Bit) — Steuerbus=Wann & Wie?",
            "Alle übertragen dasselbe",
            "Nur Datenbus überträgt Daten",
            "Adressbus überträgt Daten",
          ],
          a: 0,
          e: "Adressbus: legt Adresse an (Wohin? Größe 8/16/32/64 Bit → bestimmt Adressraum). Datenbus: überträgt eigentliche Daten bidirektional 8-512 Bit (Was?). Steuerbus: koordiniert Zugriffe, steuert wann und wie Daten übertragen werden (Wann & Wie?).",
        },
        {
          k: "Kap 2-BS",
          q: "Was passiert wenn 2 Geräte gleichzeitig über den Datenbus Daten senden?",
          o: [
            "Es entsteht ein Buskonflikt — Zugriff muss koordiniert werden sodass immer nur ein Gerät den Bus nutzt",
            "Nichts — beide können gleichzeitig senden",
            "Das langsamere Gerät verliert",
            "Der Bus wird gesperrt",
          ],
          a: 0,
          e: "Wenn 2 Geräte gleichzeitig senden entsteht ein Konflikt auf dem Bus. Daher muss der Zugriff koordiniert werden sodass immer nur ein Gerät den Bus nutzt. Der Speicher ist gemeinsam — deshalb muss der Zugriff koordiniert werden damit es keine Konflikte gibt.",
        },
        {
          k: "Kap 2-BS",
          q: "Was ist der Unterschied zwischen Harvard- und Von-Neumann-Architektur?",
          o: [
            "Harvard: getrennte Speicher — Von Neumann: gemeinsamer Speicher für Daten & Befehle",
            "Beide identisch",
            "Von Neumann hat getrennte Speicher",
            "Harvard ist moderner",
          ],
          a: 0,
          e: "Harvard: getrennte Speicher für Programm & Daten (Vertreter: Atmel AVR). Von Neumann: gemeinsamer Speicher (Vertreter: Intel x86). Nachteil Von Neumann: Programme und Daten nutzen denselben Speicher → Zugriffskonflikte & Leistungsverlust möglich.",
        },
        {
          k: "Kap 2-BS",
          q: "Was ist der Datenpfad im Von-Neumann-Rechner?",
          o: [
            "Register mit ALU verbunden → Datenpfad über den Daten fließen — Aufgaben: Register auswählen, Daten zur ALU, Ergebnis zurück",
            "Nur der Datenbus",
            "Ein Netzwerk aus Kabeln",
            "Der Weg der Befehle",
          ],
          a: 0,
          e: "Datenpfad: Register sind mit der ALU verbunden, dadurch entsteht ein Datenpfad über den Daten fließen. Aufgaben: Register auswählen, Daten zur ALU schicken, Ergebnis in Register zurückschreiben. Kern: der Datenpfad beschreibt den Weg der Daten innerhalb der CPU (Register↔ALU).",
        },
        {
          k: "Kap 2-BS",
          q: "Woraus besteht die CPU und was sind die Spezialregister?",
          o: [
            "ALU (Rechenoperationen), Control Unit (Steuerung), Register — Spezialregister: PC (nächster Befehl), IR (aktueller Befehl), Befehlsdecoder",
            "Nur aus Transistoren",
            "RAM + ROM + Kern",
            "Nur aus Registern",
          ],
          a: 0,
          e: "CPU: ALU (führt Rechenoperationen aus), Control Unit/Steuerwerk (steuert Abarbeitung, kontrolliert Befehlszähler/register/decoder), Register (schnelle kleine Speicher). Spezialregister: Program Counter/IP (Adresse nächsten Befehls), Instruction Register (aktuellen Befehl), Befehlsdecoder (zerlegt in Schritte).",
        },
        {
          k: "Kap 2-BS",
          q: "Was sind Flags (Bedingungscodes) und welche gibt es?",
          o: [
            "Spezielle Bits nach jeder ALU-Operation — Z (Zero), N (Negative), V (Overflow), C (Carry)",
            "Fehler-Indikatoren",
            "Speicheradressen",
            "Prozessidentifikatoren",
          ],
          a: 0,
          e: "Flags = spezielle Bits die nach jeder ALU-Operation gesetzt werden. Wichtig für Vergleiche und Sprungbefehle. Z (Zero): Ergebnis=0. N (Negative): Ergebnis negativ. V (Overflow): Überlauf. C (Carry): Übertrag. CPU nutzt Register zum Speichern/Verarbeiten von Daten und Flags zur Bewertung von Ergebnissen um das Programmverhalten zu steuern.",

        const mh =
          missed.length > 0
            ? `<div class="ms"><h3>Falsch beantwortet (${missed.length})</h3>${missed.map((q) => `<div class="mi"><strong>${esc(q.k)}: ${esc(q.q)}</strong>${esc(q.e)}</div>`).join("")}</div>`
            : "";
        document.getElementById("qc").innerHTML = `<div class="card res">${ring}
    <div class="rm">${msg}</div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button class="btn p" onclick="init()">Nochmal</button>
      <button class="btn" onclick="rev()">Nur Falsche</button>
    </div>${mh}</div>`;
      }

      function rev() {
        if (!missed.length) return;
        qs = shuffle(missed);
        cur = 0;
        score = 0;
        ans = false;
        missed = [];
        document.getElementById("sc").textContent = 0;
        document.getElementById("tc").textContent = qs.length;
        renderQ();
      }

      init();
    </script>
  </body>
</html>
